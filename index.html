<script data-field-replace>
(function(){
  var params=new URLSearchParams(window.location.search);
  var fields={};
  var paramMap={
    'first_name':'firstName','last_name':'lastName','full_name':'fullName',
    'email':'email','phone':'phone','company':'company',
    'city':'city','state':'state','country':'country'
  };
  var skipTags={'SCRIPT':1,'STYLE':1,'NOSCRIPT':1,'TEXTAREA':1,'CODE':1,'PRE':1};
  var hasUrlFields=false;
  for(var p in paramMap){
    var v=params.get(p);
    if(v){fields[paramMap[p]]=v;hasUrlFields=true;}
  }
  var contactId=params.get('contact_id');
  function esc(s){
    if(!s)return s;
    var d=document.createElement('div');
    d.appendChild(document.createTextNode(s));
    return d.innerHTML;
  }
  function doReplace(data){
    var r={};
    r['{{full_name}}']=esc(((data.firstName||'')+' '+(data.lastName||'')).trim()||((data.fullName||data.name)||''));
    r['{{first_name}}']=esc(data.firstName||(data.name?data.name.split(' ')[0]:'')||'');
    r['{{last_name}}']=esc(data.lastName||(data.name&&data.name.indexOf(' ')>-1?data.name.substring(data.name.indexOf(' ')+1):'')||'');
    r['{{email}}']=esc(data.email||'');
    r['{{phone}}']=esc(data.phone||'');
    r['{{company}}']=esc(data.company||'');
    r['{{city}}']=esc(data.city||'');
    r['{{state}}']=esc(data.state||'');
    r['{{country}}']=esc(data.country||'');
    r['{{date}}']=new Date().toLocaleDateString();
    r['{{time}}']=new Date().toLocaleTimeString();
    r['{{location}}']=[data.city,data.state,data.country].filter(Boolean).join(', ');
    r['{{tracking_id}}']=esc(data.trackingId||'');
    r['{{lastClickedProduct}}']=esc(data.lastClickedProduct||'');
    r['{{lastProductClickDate}}']=esc(data.lastProductClickDate||'');
    r['{{lastClickedProductPrice}}']=esc(data.lastClickedProductPrice||'');
    r['{{lastClickedProductURL}}']=esc(data.lastClickedProductURL||'');
    r['{{productsClickedCount}}']=esc(data.productsClickedCount||'0');
    r['{{ip_address}}']=esc(data.ipAddress||'');
    r['{{ip}}']=esc(data.ipAddress||'');
    if(data.customFields){
      for(var k in data.customFields){
        r['{{'+k+'}}']=esc(String(data.customFields[k]||''));
      }
    }
    params.forEach(function(v,k){
      if(!paramMap[k]&&k!=='contact_id'&&k!=='page_id'&&k.indexOf('utm_')!==0){
        r['{{'+k+'}}']=esc(v);
      }
    });
    var hasValues=false;
    for(var key in r){if(r[key]){hasValues=true;break;}}
    if(!hasValues)return;
    var walker=document.createTreeWalker(document.body,NodeFilter.SHOW_TEXT,{
      acceptNode:function(n){
        var p=n.parentNode;
        if(p&&skipTags[p.nodeName])return NodeFilter.FILTER_REJECT;
        return NodeFilter.FILTER_ACCEPT;
      }
    });
    var node;
    while(node=walker.nextNode()){
      var txt=node.nodeValue;
      if(txt&&txt.indexOf('{{')>-1){
        var changed=txt;
        for(var ph in r){
          if(r[ph]&&changed.indexOf(ph)>-1){
            changed=changed.split(ph).join(r[ph]);
          }
        }
        if(changed!==txt)node.nodeValue=changed;
      }
    }
    var attrs=['value','placeholder','content','alt','title'];
    attrs.forEach(function(attr){
      var els=document.querySelectorAll('['+attr+'*="{{"]');
      for(var i=0;i<els.length;i++){
        var tag=els[i].tagName;
        if(skipTags[tag])continue;
        var val=els[i].getAttribute(attr);
        if(val){
          var nv=val;
          for(var ph in r){
            if(r[ph]&&nv.indexOf(ph)>-1){
              nv=nv.split(ph).join(r[ph]);
            }
          }
          if(nv!==val)els[i].setAttribute(attr,nv);
        }
      }
    });
  }
  function run(){
    if(contactId){
      var xhr=new XMLHttpRequest();
      xhr.open('GET','https://app.paygogpt.com/api/landing/context/'+encodeURIComponent(contactId)+'?page_id=4600');
      xhr.onload=function(){
        if(xhr.status===200){
          try{
            var resp=JSON.parse(xhr.responseText);
            if(resp.success&&resp.contact){
              var merged=resp.contact;
              for(var k in fields){merged[k]=fields[k];}
              doReplace(merged);
              return;
            }
          }catch(e){}
        }
        if(hasUrlFields)doReplace(fields);
      };
      xhr.onerror=function(){if(hasUrlFields)doReplace(fields);};
      xhr.send();
    }else if(hasUrlFields){
      doReplace(fields);
    }
  }
  if(document.readyState==='loading'){document.addEventListener('DOMContentLoaded',run);}
  else{run();}
})();
</script>

<script>
  const API_URL = 'https://pronunciation-api-l0pg.onrender.com/assess';
  const AGENTS = {
    'fr-CA': 'https://app.paygogpt.com/agents/63330083/embed',
    'en-CA': 'https://app.paygogpt.com/agents/38837089/embed'
  };
  const PHRASES = {
    'fr-CA': [
      { text: 'Bonjour, comment allez-vous aujourd\'hui?', hint: 'Focus on the nasal vowels: "on", "ou"' },
      { text: 'Je voudrais un café, s\'il vous plaît.', hint: 'The Québec "r" is uvular - from the back of the throat' },
      { text: 'Il fait beau temps ce matin.', hint: 'Link "il" and "fait" naturally - "i-fait"' },
      { text: 'O\u00f9 est la station de m\u00e9tro la plus proche?', hint: 'Watch the liaison on "les" before vowels' },
      { text: 'J\'habite \u00e0 Montr\u00e9al depuis cinq ans.', hint: 'Silent "h" in "habite" - no pause before it' }
    ],
    'en-CA': [
      { text: 'About the house - the lights are out.', hint: 'Canadian raising: "about" and "out" vowels shift before voiceless consonants' },
      { text: 'Sorry, I didn\'t catch that, eh?', hint: '"Sorry" rhymes with "story" in Canadian English' },
      { text: 'The weather in Toronto is quite cold today.', hint: 'Flap the "t" in "Toronto" - sounds like a soft "d"' },
      { text: 'Can you pass me a double-double, please?', hint: 'Natural linking: "double-double" flows as one unit' },
      { text: 'We\'re going to the cottage this weekend.', hint: '"Going to" often reduces to "gonna" in natural speech' }
    ]
  };

  let currentLang = 'fr-CA';
  let currentPhrase = null;
  let mediaRecorder = null;
  let audioChunks = [];
  let isRecording = false;

  setRandomPhrase();

  function setLang(lang, headerBtn, cardBtn) {
    currentLang = lang;
    document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
    if (headerBtn) headerBtn.classList.add('active');
    document.querySelectorAll('.lang-select-btn').forEach(b => b.classList.remove('active'));
    if (cardBtn) cardBtn.classList.add('active');
    else document.getElementById(lang === 'fr-CA' ? 'btnFR' : 'btnEN').classList.add('active');
    document.querySelectorAll('.lang-btn').forEach(b => {
      if ((lang === 'fr-CA' && b.textContent.includes('Fran')) ||
          (lang === 'en-CA' && b.textContent.includes('Engl'))) b.classList.add('active');
    });
    document.getElementById('coachIframe').src = AGENTS[lang];
    setRandomPhrase();
    resetRecorder();
  }

  function setRandomPhrase() {
    const list = PHRASES[currentLang];
    const phrase = list[Math.floor(Math.random() * list.length)];
    currentPhrase = phrase.text;
    const el = document.getElementById('phraseDisplay');
    el.textContent = phrase.text;
    el.classList.remove('placeholder');
    document.getElementById('phraseHint').textContent = '\u1f4a1 ' + phrase.hint;
  }

  async function toggleRecording() {
    if (isRecording) stopRecording();
    else await startRecording();
  }

  async function startRecording() {
    hideError();
    try {
      const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
      audioChunks = [];
      mediaRecorder = new MediaRecorder(stream, { mimeType: getMimeType() });
      mediaRecorder.ondataavailable = e => { if (e.data.size > 0) audioChunks.push(e.data); };
      mediaRecorder.onstop = () => { stream.getTracks().forEach(t => t.stop()); processAudio(); };
      mediaRecorder.start(100);
      isRecording = true;
      document.getElementById('recordBtn').classList.add('recording');
      document.getElementById('waveform').classList.add('visible');
      setStatus('Recording... click again to stop', 'active');
    } catch (err) {
      showError(err.name === 'NotAllowedError' ? 'Microphone access denied. Please allow and try again.' : 'Could not start recording: ' + err.message);
    }
  }

  function stopRecording() {
    if (mediaRecorder && mediaRecorder.state !== 'inactive') mediaRecorder.stop();
    isRecording = false;
    document.getElementById('recordBtn').classList.remove('recording');
    document.getElementById('waveform').classList.remove('visible');
    setStatus('Processing...', 'processing');
  }

  function getMimeType() {
    for (const t of ['audio/webm;codecs=opus', 'audio/webm', 'audio/ogg;codecs=opus', 'audio/mp4'])
      if (MediaRecorder.isTypeSupported(t)) return t;
    return '';
  }

  async function processAudio() {
    try {
      const blob = new Blob(audioChunks, { type: mediaRecorder.mimeType || 'audio/webm' });
      const buf = await blob.arrayBuffer();
      // Chunked base64 - avoids call stack overflow on large audio
      const bytes = new Uint8Array(buf);
      let binary = '';
      const CHUNK = 8192;
      for (let i = 0; i < bytes.length; i += CHUNK)
        binary += String.fromCharCode(...bytes.subarray(i, i + CHUNK));
      const b64 = btoa(binary);

      const res = await fetch(API_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ mode: 'audio', reference_text: currentPhrase, locale: currentLang, audio_base64: b64 })
      });
      if (!res.ok) throw new Error('API error ' + res.status);
      const data = await res.json();
      if (!data.success) throw new Error(data.error || 'Assessment failed');
      showScores(data);
      setStatus('Assessment complete \u2713', '');
    } catch (err) {
      setStatus('Click the mic to start recording', '');
      showError('Assessment failed: ' + err.message);
    }
  }

  function showScores(data) {
    const card = document.getElementById('scoreCard');
    card.classList.add('visible');
    setScore('Pron', data.pronunciation_score);
    setScore('Acc', data.accuracy_score);
    setScore('Flu', data.fluency_score);
    setScore('Com', data.completeness_score);
    setScore('Pro', data.prosody_score);
    document.getElementById('feedbackText').textContent = data.feedback || '';
    const wrap = document.getElementById('wordsWrap');
    wrap.innerHTML = '';
    (data.words || []).forEach(w => {
      const s = w.accuracy || 0;
      const cls = s >= 80 ? 'good' : s >= 60 ? 'ok' : 'poor';
      const chip = document.createElement('div');
      chip.className = 'word-chip ' + cls;
      chip.innerHTML = '<span>' + w.word + '</span><span class="w-score">' + Math.round(s) + '</span>';
      wrap.appendChild(chip);
    });
    card.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  }

  function setScore(key, val) {
    const v = Math.round(val || 0);
    const c = v >= 80 ? 'var(--teal)' : v >= 60 ? 'var(--warn)' : 'var(--danger)';
    document.getElementById('score' + key).textContent = v;
    document.getElementById('score' + key).style.color = c;
    setTimeout(() => {
      document.getElementById('bar' + key).style.width = v + '%';
      document.getElementById('bar' + key).style.background = c;
    }, 100);
  }

  function resetRecorder() {
    document.getElementById('scoreCard').classList.remove('visible');
    document.getElementById('waveform').classList.remove('visible');
    setStatus('Click the mic to start recording', '');
    hideError();
    setRandomPhrase();
  }

  function setStatus(msg, type) {
    const el = document.getElementById('recordStatus');
    el.textContent = msg;
    el.className = 'record-status' + (type ? ' ' + type : '');
  }

  function showError(msg) {
    const el = document.getElementById('errorMsg');
    el.textContent = msg;
    el.classList.add('visible');
  }

  function hideError() {
    document.getElementById('errorMsg').classList.remove('visible');
  }
</script>

</body>
</html>
